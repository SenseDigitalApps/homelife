services:
  db:
    image: postgres:15
    container_name: medsync-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medsync-api
    restart: unless-stopped
    command: gunicorn medsync.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120 --chdir /app/app
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    expose:
      - "8000"
    volumes:
      - static_files:/app/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: medsync-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - static_files:/app/staticfiles:ro
    depends_on:
      - api

  certbot:
    image: certbot/certbot
    container_name: medsync-certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot

  redis:
    image: redis:7
    container_name: medsync-redis
    restart: unless-stopped

volumes:
  postgres_data:
  static_files:
